<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vorislar</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family: Arial;
padding:20px;
background:#0b1a2b;
color:white;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#2f7df6;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}
</style>

</head>
<body>

<h2>Lug'at qidirish</h2>

<input id="search" placeholder="So'z yozing">

<button onclick="searchWord()">Qidirish</button>

<div id="result"></div>

<hr>

<h2>Esse yozish</h2>

<textarea id="essay" rows="6" placeholder="Esseni shu yerga yozing"></textarea>

<button onclick="sendEssay()">AI bilan tahlil</button>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const words = [
{
word:"ma'rifat",
meaning:"bilim orqali haqiqatni anglash",
synonym:"ilm",
antonym:"jaholat"
},
{
word:"intilish",
meaning:"maqsad sari harakat",
synonym:"harakat",
antonym:"loqaydlik"
}
];

function searchWord(){

let q = document.getElementById("search").value.toLowerCase();

let w = words.find(x=>x.word==q);

if(!w){
document.getElementById("result").innerHTML="Topilmadi";
return;
}

document.getElementById("result").innerHTML=
`
<p>Ma'nosi: ${w.meaning}</p>
<p>Sinonim: ${w.synonym}</p>
<p>Antonim: ${w.antonym}</p>
`;
}

function sendEssay(){

let essay=document.getElementById("essay").value;

if(!essay){
alert("Matn kiriting");
return;
}

tg.sendData(essay);

}

</script>

</body>
</html>
