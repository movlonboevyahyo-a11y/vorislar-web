function searchWord(){

const input = document
.getElementById("searchInput")
.value
.toLowerCase()
.trim();

const resultBox = document.getElementById("result");

if(input === ""){
resultBox.innerHTML="";
return;
}

const results = words.filter(w =>
w.word.toLowerCase().includes(input)
);

if(results.length === 0){
resultBox.innerHTML = "❌ So‘z topilmadi";
return;
}

let html="";

results.slice(0,10).forEach(w=>{
html += `
<p><b>${w.word}</b></p>
`;
});

resultBox.innerHTML = html;

}
