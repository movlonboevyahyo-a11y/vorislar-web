<script>

// words.json faylidan so'zlarni yuklash
let words = [];

fetch("words.json")
  .then(response => response.json())
  .then(data => {
    words = data;
  });


// Qidiruv funksiyasi
function searchWord() {

  const input = document.getElementById("searchInput").value
    .toLowerCase()
    .trim();

  const results = document.getElementById("results");

  results.innerHTML = "";

  if (input === "") return;

  const filtered = words.filter(item =>
    item.word.toLowerCase().includes(input)
  );


  if (filtered.length === 0) {
    results.innerHTML = "<p>So'z topilmadi</p>";
    return;
  }

  filtered.forEach(item => {

    const div = document.createElement("div");

    div.className = "word-card";

    div.innerHTML = `
      <h3>${item.word}</h3>
      <p><b>Ma'nosi:</b> ${item.meaning}</p>
      <p><b>Sinonim:</b> ${item.synonym}</p>
      <p><b>Antonim:</b> ${item.antonym}</p>
    `;

    results.appendChild(div);

  });

}


// Harf yozilishi bilan qidirish
document.getElementById("searchInput")
.addEventListener("input", searchWord);

</script>
