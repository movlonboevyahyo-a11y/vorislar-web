<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vorislar - Esse</title>

<!-- Telegram WebApp API -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}
textarea {
    width:100%;
    height:150px;
    border-radius:10px;
    padding:10px;
    font-size:16px;
    border:none;
}
button {
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<h2>Esse yozish</h2>

<textarea id="essay" placeholder="Esse yozing..."></textarea>
<br>
<button id="sendBtn">Yuborish</button>

<script>
/* ===== TELEGRAM OBYEKTINI TEKSHIRISH ===== */

if (!window.Telegram || !window.Telegram.WebApp) {
    alert("Telegram WebApp topilmadi! Telegram ichida oching.");
} else {
    const tg = window.Telegram.WebApp;
    tg.expand();

    alert("Telegram mavjud: HA");

    document.getElementById("sendBtn").addEventListener("click", function() {
        const text = document.getElementById("essay").value;

        if (!text) {
            alert("Matn yozing!");
            return;
        }

        console.log("Yuborilmoqda:", text);

        tg.sendData(text);   // <<< BOTGA YUBORADI
    });
}
</script>

</body>
</html>
