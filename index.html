<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vorislar Platformasi</title>

  <!-- Telegram Web App Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>📚 Vorislar Platformasi</h1>
  <p>Xush kelibsiz</p>

  <div id="userInfo"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe.user;

    if (user) {
      document.getElementById("userInfo").innerHTML =
        "👤 Foydalanuvchi: " + user.first_name;
    }
  </script>

</body>
</html>
