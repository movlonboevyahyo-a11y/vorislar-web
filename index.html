<!DOCTYPE html><html lang="uz">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ona tili platformasi</title><style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:18px;
font-size:22px;
font-weight:bold;
}

.page{
display:none;
padding:20px;
padding-bottom:90px;
}

.active{
display:block;
}

.search-box{
background:white;
padding:12px;
border-radius:12px;
}

.search-box input{
width:100%;
border:none;
font-size:16px;
outline:none;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.catalog-card{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
color:black;
border-radius:15px;
padding:15px;
margin-top:15px;
}

.catalog-card img{
width:60px;
}

.catalog-card button{
background:#3b82f6;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
}

textarea{
width:100%;
height:200px;
border-radius:10px;
border:none;
padding:10px;
margin-top:10px;
}

.profile{
text-align:center;
}

.profile img{
width:100px;
border-radius:50%;
}

nav{
position:fixed;
bottom:0;
background:#020617;
width:100%;
display:flex;
justify-content:space-around;
padding:12px;
}

nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

</style></head><body><header>📚 Ona tili xazinasi</header><!-- QIDIRUV --><div id="search" class="page active"><div class="search-box"><input id="searchInput" placeholder="So'zni qidiring"></div><div class="card"><h3>Kun so'zi</h3><div id="wordDay"></div></div><div id="searchResults"></div></div><!-- KATALOG --><div id="catalog" class="page"><h2>Mavzular katalogi</h2><div class="catalog-card"><div><h3>Grammatika</h3><p>Morfologiya va sintaksis</p><button onclick="openTopic('grammar')">Boshlash</button>

</div><img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"></div><div class="catalog-card"><div><h3>Ilmiy matn</h3><p>Matn tahlili</p><button onclick="openTopic('science')">Boshlash</button>

</div><img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png"></div><div class="catalog-card"><div><h3>Badiiy matn</h3><p>Adabiy tahlil</p><button onclick="openTopic('literature')">Boshlash</button>

</div><img src="https://cdn-icons-png.flaticon.com/512/29/29302.png"></div><div class="catalog-card"><div><h3>Imlo va lug'at</h3><p>Murakkab so'zlar</p><button onclick="openTopic('dictionary')">Boshlash</button>

</div><img src="https://cdn-icons-png.flaticon.com/512/1250/1250615.png"></div><div id="topicContent"></div></div><!-- TEST --><div id="test" class="page"><h2>Testlar</h2><div id="testBox" class="card"></div><button onclick="nextTest()">Keyingi</button>

<p id="score"></p></div><!-- ESSE --><div id="essay" class="page"><h2>Esse yozish</h2><textarea id="essayInput" placeholder="Esse yozing..."></textarea><p>So'zlar soni: <span id="count">0</span></p><button>AI bilan tahlil qilish (demo)</button>

</div><!-- PROFIL --><div id="profile" class="page"><div class="profile"><img src="https://i.pravatar.cc/120"><h3>Azizbek Toirov</h3><p>Sertifikat darajasi: B2</p><button>Premiumga o'tish</button>

</div></div><!-- NAVBAR --><nav><button onclick="showPage('search')">Qidiruv</button>
<button onclick="showPage('catalog')">Katalog</button>
<button onclick="showPage('test')">Testlar</button>
<button onclick="showPage('essay')">Esse</button>
<button onclick="showPage('profile')">Profil</button>

</nav><script>

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}


/* KUN SO'ZI */

const words=[

{word:"Ma'rifat",meaning:"Bilim va madaniyatni oshirish"},
{word:"Ziyo",meaning:"Ma'naviy nur"},
{word:"Tafakkur",meaning:"Fikr yuritish"},
{word:"Adab",meaning:"Odob va hurmat"},
{word:"Ilm",meaning:"Bilim"}

]

let w=words[Math.floor(Math.random()*words.length)]

document.getElementById("wordDay").innerHTML="<b>"+w.word+"</b><p>"+w.meaning+"</p>"


/* QIDIRUV */

document.getElementById("searchInput").addEventListener("input",function(){

let q=this.value.toLowerCase()

let r=document.getElementById("searchResults")

r.innerHTML=""

words.filter(x=>x.word.toLowerCase().includes(q)).forEach(x=>{

r.innerHTML+="<div class='card'><b>"+x.word+"</b><p>"+x.meaning+"</p></div>"

})

})


/* KATALOG DATA */

const topics={

grammar:[
"Ot turkumi",
"Fe'l zamonlari",
"Sifat darajalari",
"Olmoshlar",
"Ravishlar",
"Bog'lovchilar",
"Ko'makchilar",
"Yuklamalar",
"Sintaksis",
"Gap bo'laklari"
],

science:[
"Ilmiy uslub",
"Dalillash",
"Matn tahlili",
"Terminlar",
"Ilmiy nutq",
"Xulosa",
"Tadqiqot",
"Maqola",
"Statistika",
"Tahlil"
],

literature:[
"Metafora",
"Epitet",
"Taqqoslash",
"Badiiy matn",
"Adabiy janr",
"Lirika",
"Nasr",
"Drama",
"Adabiy uslub",
"Badiiy tasvir"
],

dictionary:[
"Sinonim",
"Antonim",
"Frazeologizm",
"Neologizm",
"Arxaizm",
"Dialekt",
"Termin",
"Ko'p ma'no",
"So'z yasalishi",
"Lug'at boyligi"
]

}


/* TOPIC OCHISH */

function openTopic(name){

let arr=topics[name]

let html=""

arr.forEach((t,i)=>{

html+="<div class='card'>"+(i+1)+". "+t+"</div>"

})

document.getElementById("topicContent").innerHTML=html

}


/* ESSE WORD COUNT */

let txt=document.getElementById("essayInput")

txt.addEventListener("input",function(){

let w=txt.value.trim().split(/\s+/)

document.getElementById("count").innerText=w[0]==""?0:w.length

})

</script></body>
</html>
